<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Castle Kickflip GB</title>
  <style>
    :root {
      --bg-dark: #0f381f;
      --bg-mid: #306230;
      --bg-light: #8bac0f;
      --bg-pale: #9bbc0f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, var(--bg-mid), #08150c 70%);
      color: var(--bg-pale);
      font-family: "Courier New", monospace;
      display: grid;
      place-items: center;
      padding: 1rem;
      touch-action: manipulation;
    }
    .shell {
      width: min(96vw, 820px);
      background: #143d1d;
      border: 8px solid #1b5128;
      border-radius: 18px;
      box-shadow: 0 18px 30px rgba(0,0,0,.5);
      padding: 1rem;
    }
    h1 {
      margin: 0 0 .4rem;
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--bg-pale);
    }
    p { margin: .2rem 0 .6rem; font-size: .9rem; }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 6px solid #1a491f;
      background: var(--bg-light);
      display: block;
    }
    .hud {
      margin-top: .6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      font-size: .9rem;
    }
    .controls {
      margin-top: .8rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .45rem;
      user-select: none;
    }
    button {
      border: 0;
      background: #275e30;
      color: var(--bg-pale);
      padding: .8rem .4rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      touch-action: none;
    }
    button:active,
    button.on {
      background: #3d7d43;
      transform: translateY(1px);
    }
    .hint { grid-column: 1 / -1; font-size: .78rem; opacity: .9; text-align: center; }
    @media (min-width: 760px) {
      .controls { max-width: 420px; margin-inline: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Castle Kickflip GB</h1>
    <p>Skate through the haunted keep, dodge armor ghosts, and collect relic coins.</p>
    <canvas id="game" width="640" height="360" aria-label="Castle skateboarding game"></canvas>
    <div class="hud">
      <div id="score">SCORE: 0000</div>
      <div id="best">BEST: 0000</div>
      <div id="status">RUN!</div>
    </div>
    <div class="controls">
      <button data-key="ArrowLeft">◀</button>
      <button data-key="ArrowUp">▲ JUMP</button>
      <button data-key="ArrowRight">▶</button>
      <button data-key="KeyZ">GRIND</button>
      <button data-key="Space">RESTART</button>
      <button data-key="KeyX">TRICK</button>
      <div class="hint">Keyboard: ← → move, ↑ jump, Z grind, X trick, Space restart</div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');

    const keys = new Set();
    const floorY = 300;
    const gravity = 0.52;
    const obstacles = [];
    const coins = [];

    let score = 0;
    let best = Number(localStorage.getItem('castleKickflipBest') || 0);
    let gameOver = false;
    let spawnTimer = 0;
    let coinTimer = 0;
    let speed = 3.8;
    bestEl.textContent = `BEST: ${String(best).padStart(4, '0')}`;

    const player = {
      x: 70,
      y: floorY - 34,
      w: 22,
      h: 34,
      vy: 0,
      facing: 1,
      onGround: true,
      grinding: false,
      tricking: false,
      trickTimer: 0,
    };

    function press(key, active) {
      if (active) keys.add(key);
      else keys.delete(key);
    }

    addEventListener('keydown', (e) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space", "KeyZ", "KeyX"].includes(e.code)) e.preventDefault();
      if (e.code === 'Space' && gameOver) reset();
      press(e.code, true);
    });
    addEventListener('keyup', (e) => press(e.code, false));

    for (const btn of document.querySelectorAll('button[data-key]')) {
      const key = btn.dataset.key;
      const set = (on) => {
        btn.classList.toggle('on', on);
        if (key === 'Space' && on && gameOver) reset();
        press(key, on);
      };
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); set(true); }, {passive: false});
      btn.addEventListener('touchend', (e) => { e.preventDefault(); set(false); }, {passive: false});
      btn.addEventListener('mousedown', () => set(true));
      btn.addEventListener('mouseup', () => set(false));
      btn.addEventListener('mouseleave', () => set(false));
    }

    function reset() {
      score = 0;
      speed = 3.8;
      gameOver = false;
      obstacles.length = 0;
      coins.length = 0;
      spawnTimer = 0;
      coinTimer = 0;
      Object.assign(player, {x: 70, y: floorY - 34, vy: 0, onGround: true, grinding: false, tricking: false, trickTimer: 0});
      statusEl.textContent = 'RUN!';
    }

    function spawnObstacle() {
      const tall = Math.random() > 0.55;
      obstacles.push({
        x: canvas.width + 10,
        y: floorY - (tall ? 58 : 34),
        w: tall ? 24 : 28,
        h: tall ? 58 : 34,
        ghost: tall,
      });
    }

    function spawnCoin() {
      coins.push({
        x: canvas.width + 8,
        y: floorY - 70 - Math.random() * 110,
        r: 7,
        spin: 0,
      });
    }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (gameOver) return;
      score += 1;
      speed = Math.min(7.5, speed + 0.0006);

      const moving = keys.has('ArrowRight') || !keys.has('ArrowLeft');
      player.facing = moving ? 1 : -1;
      if (keys.has('ArrowLeft')) player.x = Math.max(24, player.x - 2.2);
      if (keys.has('ArrowRight')) player.x = Math.min(170, player.x + 2.4);

      if (keys.has('ArrowUp') && player.onGround) {
        player.vy = -10.6;
        player.onGround = false;
      }

      player.grinding = keys.has('KeyZ') && !player.onGround;
      if (keys.has('KeyX') && !player.onGround && player.trickTimer <= 0) {
        player.tricking = true;
        player.trickTimer = 18;
        score += 80;
      }
      if (player.trickTimer > 0) player.trickTimer--;
      else player.tricking = false;

      player.vy += gravity;
      player.y += player.vy;
      if (player.y >= floorY - player.h) {
        player.y = floorY - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      spawnTimer -= 1;
      coinTimer -= 1;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = 80 + Math.random() * 60;
      }
      if (coinTimer <= 0) {
        spawnCoin();
        coinTimer = 90 + Math.random() * 70;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        ob.x -= speed;
        if (ob.x + ob.w < -5) obstacles.splice(i, 1);
        else if (intersects(player, ob) && !(player.grinding && player.y + player.h - 4 < ob.y + 10)) {
          gameOver = true;
          statusEl.textContent = 'WIPEOUT! Tap RESTART';
          if (score > best) {
            best = score;
            localStorage.setItem('castleKickflipBest', best);
            bestEl.textContent = `BEST: ${String(best).padStart(4, '0')}`;
          }
        }
      }

      for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        c.x -= speed;
        c.spin += 0.3;
        if (c.x + c.r < 0) coins.splice(i, 1);
        else {
          const box = {x: c.x - c.r, y: c.y - c.r, w: c.r * 2, h: c.r * 2};
          if (intersects(player, box)) {
            coins.splice(i, 1);
            score += 50;
          }
        }
      }

      scoreEl.textContent = `SCORE: ${String(score).padStart(4, '0')}`;
    }

    function drawBackground() {
      ctx.fillStyle = '#9bbc0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#8bac0f';
      for (let i = 0; i < 12; i++) {
        const x = (i * 66 - (score * 0.2 % 66));
        const h = 40 + (i % 4) * 18;
        ctx.fillRect(x, floorY - 120 - h, 50, h);
      }
      ctx.fillStyle = '#306230';
      for (let i = 0; i < 8; i++) {
        const x = (i * 108 - (score * 0.45 % 108));
        ctx.fillRect(x, floorY - 185, 16, 65);
        ctx.fillRect(x - 12, floorY - 120, 40, 120);
      }
      ctx.fillStyle = '#0f381f';
      ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
      ctx.fillStyle = '#306230';
      for (let i = 0; i < canvas.width; i += 18) {
        ctx.fillRect(i - (score % 18), floorY + 8, 10, 2);
      }
    }

    function drawPlayer() {
      const x = Math.round(player.x), y = Math.round(player.y);
      ctx.save();
      if (player.tricking) {
        ctx.translate(x + player.w / 2, y + player.h / 2);
        ctx.rotate((18 - player.trickTimer) * 0.24);
        ctx.translate(-(x + player.w / 2), -(y + player.h / 2));
      }

      ctx.fillStyle = '#0f381f';
      ctx.fillRect(x + 8, y, 7, 8);
      ctx.fillRect(x + 4, y + 8, 15, 12);
      ctx.fillRect(x + 5, y + 20, 5, 10);
      ctx.fillRect(x + 12, y + 20, 5, 10);

      const boardY = y + player.h - 2;
      ctx.fillStyle = '#306230';
      ctx.fillRect(x - 2, boardY, 26, 4);
      ctx.fillStyle = '#0f381f';
      ctx.fillRect(x, boardY + 3, 4, 2);
      ctx.fillRect(x + 18, boardY + 3, 4, 2);

      if (player.grinding) {
        ctx.fillStyle = '#8bac0f';
        ctx.fillRect(x + 22, y + 16, 10, 2);
      }

      ctx.restore();
    }

    function drawObstacles() {
      for (const ob of obstacles) {
        ctx.fillStyle = '#0f381f';
        ctx.fillRect(Math.round(ob.x), Math.round(ob.y), ob.w, ob.h);
        if (ob.ghost) {
          ctx.fillStyle = '#9bbc0f';
          ctx.fillRect(Math.round(ob.x + 5), Math.round(ob.y + 12), 4, 4);
          ctx.fillRect(Math.round(ob.x + 15), Math.round(ob.y + 12), 4, 4);
        }
      }
    }

    function drawCoins() {
      for (const c of coins) {
        const pulse = Math.abs(Math.sin(c.spin));
        ctx.fillStyle = '#0f381f';
        ctx.fillRect(Math.round(c.x - c.r), Math.round(c.y - c.r), c.r * 2, c.r * 2);
        ctx.fillStyle = pulse > 0.5 ? '#9bbc0f' : '#8bac0f';
        ctx.fillRect(Math.round(c.x - 3), Math.round(c.y - 5), 6, 10);
      }
    }

    function draw() {
      drawBackground();
      drawCoins();
      drawObstacles();
      drawPlayer();
      if (gameOver) {
        ctx.fillStyle = 'rgba(15,56,31,0.76)';
        ctx.fillRect(120, 120, 400, 110);
        ctx.fillStyle = '#9bbc0f';
        ctx.font = '28px Courier New';
        ctx.fillText('WIPEOUT', 255, 165);
        ctx.font = '16px Courier New';
        ctx.fillText('Press SPACE or tap RESTART', 182, 198);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    reset();
    loop();
  </script>
</body>
</html>
