<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalisz Street Survivor - Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <section class="hud">
      <h1>Kalisz Street Survivor</h1>
      <p>Arrow keys: move / jump • <strong>S</strong>: attack (A) • <strong>D</strong>: interact (B)</p>
      <p id="status">Find shelter and avoid hazards in the old town.</p>
    </section>
    <canvas id="game" width="960" height="540" aria-label="Game screen"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
